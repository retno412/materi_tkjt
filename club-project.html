<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Coding Club - Project Management</title>
    <!-- Menghubungkan ke file CSS utama Anda -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Gaya Khusus Halaman Manajemen Project agar Selaras dengan Tema Utama */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
        }
        .club-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        .club-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }
        .btn-back {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            color: #ffffff;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-back:hover {
            transform: translateX(-3px);
            filter: brightness(1.1);
        }
        .club-title h1 {
            margin: 0;
            font-size: 2rem;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Form Input Sederhana & Edukatif */
        .project-form-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 3rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
        }
        .form-group input, .form-group select {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 0.75rem;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #6366f1;
        }
        .btn-submit {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-weight: 700;
            cursor: pointer;
            align-self: flex-end;
            transition: all 0.2s;
            height: 45px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        /* Layout Pembagian Kolom Project */
        .project-columns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 2rem;
        }
        @media (max-width: 600px) {
            .project-columns { grid-template-columns: 1fr; }
        }
        .column-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.5rem;
        }
        .column-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 2px solid rgba(255,255,255,0.05);
            padding-bottom: 0.5rem;
        }
        .title-sekolah { color: #38bdf8; }
        .title-pesanan { color: #fbbf24; }

        /* Item Project Card */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .project-item {
            background: rgba(30, 41, 59, 0.5);
            border-left: 4px solid #6366f1;
            border-radius: 0 12px 12px 0;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        .project-item.type-pesanan {
            border-left-color: #f59e0b;
        }
        .project-info h4 {
            margin: 0 0 0.25rem 0;
            font-size: 1.05rem;
            color: #ffffff;
        }
        .project-timeline {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 20px;
            font-weight: bold;
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.4);
        }
        .status-badge.deployed {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }
        .btn-delete {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.25rem;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .btn-delete:hover { opacity: 1; }
        
        .empty-text {
            color: #64748b;
            font-style: italic;
            font-size: 0.9rem;
            text-align: center;
            padding: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="club-container">
        <!-- HEADER NAVIGASI -->
        <header class="club-header">
            <div class="club-title">
                <h1>📁 Tech Coding Club — Project Center</h1>
            </div>
            <a href="index.html" class="btn-back">⬅ Menu Utama</a>
        </header>

        <!-- FORM INPUT PROJECT BARU -->
        <div class="project-form-card">
            <h3 style="margin-top:0; margin-bottom:1rem; font-size:1.1rem; color:#f1f5f9;">➕ Tambah Permintaan Project Baru</h3>
            <form id="projectForm" onsubmit="saveProject(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="pName">Nama/Deskripsi Project</label>
                        <input type="text" id="pName" placeholder="Contoh: Aplikasi Absensi QR Code" required>
                    </div>
                    <div class="form-group">
                        <label for="pCategory">Kategori Project</label>
                        <select id="pCategory">
                            <option value="sekolah">🏫 Kebutuhan Sekolah</option>
                            <option value="pesanan">🛍️ Kebutuhan Pesanan</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pStart">Tanggal Terima</label>
                        <input type="date" id="pStart" required>
                    </div>
                    <div class="form-group">
                        <label for="pEnd">Estimasi Deploy / Selesi</label>
                        <input type="date" id="pEnd" required>
                    </div>
                    <div class="form-group">
                        <label for="pStatus">Status</label>
                        <select id="pStatus">
                            <option value="proses">⏳ Dalam Proses</option>
                            <option value="deployed">🚀 Deployed</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-submit">Simpan</button>
                </div>
            </form>
        </div>

        <!-- DUA KOLOM UTAMA LIST PROJECT -->
        <div class="project-columns">
            
            <!-- KOLOM KEBUTUHAN SEKOLAH -->
            <div class="column-card">
                <h3 class="column-title title-sekolah">🏫 Kebutuhan Sekolah</h3>
                <div id="listSekolah" class="project-list">
                    <!-- Data dari JS akan di-render di sini -->
                </div>
            </div>

            <!-- KOLOM KEBUTUHAN PESANAN -->
            <div class="column-card">
                <h3 class="column-title title-pesanan">🛍️ Kebutuhan Pesanan</h3>
                <div id="listPesanan" class="project-list">
                    <!-- Data dari JS akan di-render di sini -->
                </div>
            </div>

        </div>
    </div>

    <!-- SCRIPT LOGIKA RINGAN (LOCALSTORAGE) -->
    <script>
        // Ambil data lama atau inisialisasi kosong jika baru dibuka pertama kali
        let projects = JSON.parse(localStorage.getItem('club_projects')) || [
            { id: 1, name: "E-Library SMK AMI Deltamas", category: "sekolah", start: "2026-05-10", end: "2026-06-25", status: "proses" },
            { id: 2, name: "Landing Page UMKM Bengkel Lokal", category: "pesanan", start: "2026-06-01", end: "2026-06-15", status: "deployed" }
        ];

        function renderProjects() {
            const listSekolah = document.getElementById('listSekolah');
            const listPesanan = document.getElementById('listPesanan');
            
            listSekolah.innerHTML = '';
            listPesanan.innerHTML = '';

            const sekolahProjects = projects.filter(p => p.category === 'sekolah');
            const pesananProjects = projects.filter(p => p.category === 'pesanan');

            // Render Sekolah
            if (sekolahProjects.length === 0) {
                listSekolah.innerHTML = '<p class="empty-text">Belum ada project sekolah.</p>';
            } else {
                sekolahProjects.forEach(p => listSekolah.appendChild(createProjectCard(p)));
            }

            // Render Pesanan
            if (pesananProjects.length === 0) {
                listPesanan.innerHTML = '<p class="empty-text">Belum ada project pesanan external.</p>';
            } else {
                pesananProjects.forEach(p => listPesanan.appendChild(createProjectCard(p)));
            }
        }

        function createProjectCard(project) {
            const card = document.createElement('div');
            card.className = `project-item ${project.category === 'pesanan' ? 'type-pesanan' : ''}`;
            
            const isDeployed = project.status === 'deployed';
            
            card.innerHTML = `
                <div class="project-info">
                    <h4>${project.name}</h4>
                    <div class="project-timeline">
                        📅 <span>${formatDate(project.start)}</span> s/d <span>${formatDate(project.end)}</span>
                    </div>
                    <div style="margin-top: 0.5rem;">
                        <span class="status-badge ${isDeployed ? 'deployed' : ''}">
                            ${isDeployed ? '🚀 Deployed' : '⏳ Proses'}
                        </span>
                    </div>
                </div>
                <button class="btn-delete" onclick="deleteProject(${project.id})" title="Hapus Data">🗑️</button>
            `;
            return card;
        }

        function saveProject(e) {
            e.preventDefault();
            const newProject = {
                id: Date.now(),
                name: document.getElementById('pName').value,
                category: document.getElementById('pCategory').value,
                start: document.getElementById('pStart').value,
                end: document.getElementById('pEnd').value,
                status: document.getElementById('pStatus').value
            };

            projects.push(newProject);
            localStorage.setItem('club_projects', JSON.stringify(projects));
            renderProjects();
            document.getElementById('projectForm').reset();
        }

        function deleteProject(id) {
            if(confirm("Apakah Anda yakin ingin menghapus data project ini?")) {
                projects = projects.filter(p => p.id !== id);
                localStorage.setItem('club_projects', JSON.stringify(projects));
                renderProjects();
            }
        }

        function formatDate(dateString) {
            if(!dateString) return '-';
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('id-ID', options);
        }

        // Jalankan render saat halaman dimuat
        renderProjects();
    </script>
</body>
</html>
